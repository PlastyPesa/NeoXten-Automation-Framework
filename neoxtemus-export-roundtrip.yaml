# Neoxtemus — Export round-trip automation
# Clean state → onboard with PIN → export to known path → verify file → restore via UI → assert usable
# Run: node dist/cli/index.js run --config neoxtemus-export-roundtrip.yaml
preRun: node scripts/clean-neoxtemus-state.js

project:
  type: tauri
  root: ../neoxtemus/neoxtemus-app
  tauri:
    strategy: cdp
    devCommand: npm run tauri dev
    devCwd: .
    devUrl: http://localhost:1420
    cdpPort: 9222
    startupTimeoutMs: 120000

flows:
  - name: boot_and_onboard_with_pin
    steps:
      - action: assert
        type: visible
        selector: "[data-testid='app-root']"
        timeout: 30000
      - action: assert
        type: visible
        selector: "[data-testid='onboarding-screen']"
        timeout: 10000
      - action: click
        selector: "[data-testid='get-started-btn']"
        timeout: 5000
      - action: type
        selector: "[data-testid='master-password-input']"
        text: "TestMaster!2026#Secure"
        timeout: 5000
      - action: type
        selector: "[data-testid='confirm-password-input']"
        text: "TestMaster!2026#Secure"
        timeout: 5000
      - action: click
        selector: "[data-testid='next-step-btn']"
        timeout: 5000
      - action: type
        selector: "[data-testid='setup-pin-0']"
        text: "1"
      - action: type
        selector: "[data-testid='setup-pin-1']"
        text: "2"
      - action: type
        selector: "[data-testid='setup-pin-2']"
        text: "3"
      - action: type
        selector: "[data-testid='setup-pin-3']"
        text: "4"
      - action: type
        selector: "[data-testid='setup-pin-4']"
        text: "5"
      - action: type
        selector: "[data-testid='setup-pin-5']"
        text: "6"
      - action: assert
        type: visible
        selector: "[data-testid='create-vault-btn']"
        timeout: 5000
      - action: click
        selector: "[data-testid='create-vault-btn']"
        timeout: 20000
      - action: wait
        timeout: 20000
      - action: assert
        type: visible
        selector: "[data-testid='overview-view']"
        timeout: 25000

  - name: add_known_entry_before_export
    steps:
      - action: click
        selector: "[data-testid='overview-view-keys']"
        timeout: 5000
      - action: wait
        timeout: 600
      - action: assert
        type: visible
        selector: "[data-testid='vault-view']"
        timeout: 10000
      - action: click
        selector: "[data-testid='add-entry-btn']"
        timeout: 5000
      - action: assert
        type: visible
        selector: "[data-testid='add-entry-modal']"
        timeout: 5000
      - action: evaluate
        expression: |
          (() => {
            const el = document.querySelector('[data-testid="template-login"]');
            if (el) { el.scrollIntoView({ block: 'center' }); el.click(); }
          })()
      - action: wait
        timeout: 400
      - action: type
        selector: "[data-testid='add-name']"
        text: "RoundTrip Test Entry"
        timeout: 5000
      - action: type
        selector: "[data-testid='field-password']"
        text: "rt-secret-123456"
        timeout: 5000
      - action: evaluate
        expression: |
          (() => { document.querySelector('[data-testid="add-submit"]')?.click(); })()
      - action: wait
        timeout: 1500
      - action: assert
        type: contains
        selector: "[data-testid='vault-view']"
        text: "RoundTrip Test Entry"
        timeout: 10000

  - name: export_backup_to_known_path
    steps:
      - action: wait
        timeout: 1000
      - action: click
        selector: "[data-testid='dock-settings']"
        timeout: 5000
      - action: assert
        type: visible
        selector: "[data-testid='settings-view']"
        timeout: 5000
      - action: evaluate
        expression: |
          (async () => {
            const p = "C:/Users/Bobby/Documents/NeoXten-Automation-Framework/fixtures/tmp/roundtrip-backup.nex";
            await window.__NEOXTEMUS_EXPORT_TO_PATH__(p);
          })()
      - action: wait
        timeout: 1500

  - name: restore_backup_via_ui
    steps:
      - action: assert
        type: visible
        selector: "[data-testid='restore-btn']"
        timeout: 5000
      - action: setInputFiles
        selector: "[data-testid='restore-file-input']"
        files:
          - "C:/Users/Bobby/Documents/NeoXten-Automation-Framework/fixtures/tmp/roundtrip-backup.nex"
        timeout: 5000
      - action: assert
        type: visible
        selector: "[data-testid='restore-modal']"
        timeout: 5000
      - action: type
        selector: "[data-testid='restore-password-input']"
        text: "TestMaster!2026#Secure"
        timeout: 5000
      - action: click
        selector: "[data-testid='restore-confirm-btn']"
        timeout: 5000
      - action: wait
        timeout: 5000
      - action: assert
        type: visible
        selector: "[data-testid='unlock-screen']"
        timeout: 10000

  - name: unlock_and_assert_usable
    steps:
      - action: assert
        type: visible
        selector: "[data-testid='unlock-screen']"
        timeout: 8000
      - action: evaluate
        expression: |
          (async () => {
            const btn = document.querySelector('[data-testid="switch-to-password"]');
            if (btn) btn.click();
          })()
      - action: wait
        timeout: 800
      - action: type
        selector: "[data-testid='password-input']"
        text: "TestMaster!2026#Secure"
        timeout: 5000
      - action: click
        selector: "[data-testid='unlock-button']"
        timeout: 10000
      - action: wait
        timeout: 3000
      - action: assert
        type: visible
        selector: "[data-testid='settings-view'], [data-testid='overview-view'], [data-testid='vault-view']"
        timeout: 15000
      - action: click
        selector: "[data-testid='dock-vault']"
        timeout: 5000
      - action: wait
        timeout: 600
      - action: assert
        type: contains
        selector: "[data-testid='vault-view']"
        text: "RoundTrip Test Entry"
        timeout: 10000

gates:
  startupMaxMs: 120000
  noConsoleErrors: false

artifacts:
  traceOnFailure: true
  screenshotOnFailure: true
  screenshotFinal: true
  consoleLog: true
