# Neoxtemus — Full vault create + PIN lock/unlock (CDP = real Tauri app)
# Run: node dist/cli/index.js run --config neoxtemus-vault-full.yaml
# Requires: Clean vault state (delete vault.enc + vault_pin.enc from app data dir if re-running)
# Uses same flows as vault-test through master_password_entry, then create + lock + PIN unlock.

project:
  type: tauri
  root: ../neoxtemus/neoxtemus-app
  tauri:
    strategy: cdp
    devCommand: "npm run tauri dev"
    devCwd: .
    devUrl: http://localhost:1420
    cdpPort: 9222

flows:
  - name: app_renders
    steps:
      - action: assert
        type: visible
        selector: "[data-testid='app-root']"
        timeout: 30000
      - action: wait
        timeout: 1500

  - name: onboarding_screen_visible
    steps:
      - action: assert
        type: visible
        selector: "[data-testid='onboarding-screen']"
        timeout: 10000

  - name: get_started
    steps:
      - action: click
        selector: "[data-testid='get-started-btn']"
        timeout: 5000
      - action: wait
        timeout: 600
      - action: assert
        type: visible
        selector: "[data-testid='onboarding-step-1']"
        timeout: 5000

  - name: master_password_entry
    steps:
      - action: type
        selector: "[data-testid='master-password-input']"
        text: "TestMaster!2026#Secure"
        timeout: 5000
      - action: type
        selector: "[data-testid='confirm-password-input']"
        text: "TestMaster!2026#Secure"
        timeout: 5000
      - action: click
        selector: "[data-testid='next-step-btn']"
        timeout: 5000
      - action: wait
        timeout: 600

  - name: create_vault_with_pin
    steps:
      - action: assert
        type: visible
        selector: "[data-testid='onboarding-step-2']"
        timeout: 5000
      - action: assert
        type: visible
        selector: "[data-testid='setup-pin-input']"
        timeout: 5000
      - action: type
        selector: "[data-testid='setup-pin-0']"
        text: "1"
        timeout: 2000
      - action: type
        selector: "[data-testid='setup-pin-1']"
        text: "2"
        timeout: 2000
      - action: type
        selector: "[data-testid='setup-pin-2']"
        text: "3"
        timeout: 2000
      - action: type
        selector: "[data-testid='setup-pin-3']"
        text: "4"
        timeout: 2000
      - action: type
        selector: "[data-testid='setup-pin-4']"
        text: "5"
        timeout: 2000
      - action: type
        selector: "[data-testid='setup-pin-5']"
        text: "6"
        timeout: 2000
      - action: assert
        type: visible
        selector: "[data-testid='create-vault-btn']"
        timeout: 5000
      - action: click
        selector: "[data-testid='create-vault-btn']"
        timeout: 15000
      - action: wait
        timeout: 5000
      - action: assert
        type: visible
        selector: "[data-testid='overview-view']"
        timeout: 15000

  - name: lock_and_unlock_with_pin
    steps:
      - action: click
        selector: "[data-testid='dock-settings']"
        timeout: 5000
      - action: wait
        timeout: 600
      - action: assert
        type: visible
        selector: "[data-testid='lock-now-btn']"
        timeout: 5000
      - action: click
        selector: "[data-testid='lock-now-btn']"
        timeout: 5000
      - action: wait
        timeout: 1200
      - action: assert
        type: visible
        selector: "[data-testid='unlock-screen']"
        timeout: 8000
      - action: assert
        type: visible
        selector: "[data-testid='pin-section']"
        timeout: 8000
      - action: type
        selector: "[data-testid='pin-input-0']"
        text: "1"
        timeout: 2000
      - action: type
        selector: "[data-testid='pin-input-1']"
        text: "2"
        timeout: 2000
      - action: type
        selector: "[data-testid='pin-input-2']"
        text: "3"
        timeout: 2000
      - action: type
        selector: "[data-testid='pin-input-3']"
        text: "4"
        timeout: 2000
      - action: type
        selector: "[data-testid='pin-input-4']"
        text: "5"
        timeout: 2000
      - action: type
        selector: "[data-testid='pin-input-5']"
        text: "6"
        timeout: 2000
      - action: wait
        timeout: 800
      - action: click
        selector: "[data-testid='unlock-button']"
        timeout: 8000
      - action: wait
        timeout: 2000
      - action: assert
        type: visible
        selector: "[data-testid='overview-view']"
        timeout: 15000

gates:
  startupMaxMs: 90000
  noConsoleErrors: false

artifacts:
  traceOnFailure: true
  screenshotOnFailure: true
  screenshotFinal: true
  consoleLog: true
